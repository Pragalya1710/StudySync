
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - StudySync</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body class="auth-body">

<div class="auth-card">

<h1>Create Account 🚀</h1>

<p>
Join StudySync and boost your productivity.
</p>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<select name="role">

<option value="Student">
Student
</option>

<option value="Group Leader">
Group Leader
</option>

</select>

<button type="submit">
Create Account
</button>

</form>

<br>

<p>
Already have an account?

<a href="/login">
Login Here
</a>

</p>

</div>

</body>
</html>
