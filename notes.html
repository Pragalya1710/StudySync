<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes - StudySync</title>


<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">


</head>

<body>

<nav>


<div class="logo">StudySync</div>

<ul>
    <li><a href="/dashboard">Dashboard</a></li>
    <li><a href="/notes">Notes</a></li>
    <li><a href="/tasks">Tasks</a></li>
    <li><a href="/progress">Progress</a></li>
    <li><a href="/ai">AI Assistant</a></li>
    <li><a href="/logout">Logout</a></li>
</ul>


</nav>

<div class="container">


<h1>📝 Notes Manager</h1>

<form method="POST">

    <input
        type="text"
        name="title"
        placeholder="Enter Note Title"
        required>

    <textarea
        name="content"
        placeholder="Write your study notes here..."
        required></textarea>

    <button type="submit">
        Save Note
    </button>

</form>

<br>

<div class="card">

    <h2>Notes Features</h2>

    <p>✔ Create Notes</p>
    <p>✔ Store Notes in Database</p>
    <p>✔ Organize Study Materials</p>
    <p>✔ Quick Access Anytime</p>

</div>


</div>

</body>
</html>
